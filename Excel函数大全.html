<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel 函数大全 · 交互式参考手册</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --bg: #f8fafc;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-muted: #64748b;
    --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
    --radius: 10px;
    --radius-sm: 6px;
    --transition: all .2s ease;
    --card-bg: #ffffff;
    --card-hover-bg: #f8fafc;
    --usage-bg: #f8fafc;
    --input-bg: #ffffff;
    --code-bg: #1e1e3e;
    --example-bg: #fffbeb;
    --notes-bg: #eff6ff;
    --params-bg: #fafafa;
  }
  [data-theme="dark"] {
    --primary: #3b82f6;
    --primary-dark: #2563eb;
    --bg: #0f172a;
    --surface: #1e293b;
    --border: #334155;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --shadow: 0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,.3), 0 2px 4px -1px rgba(0,0,0,.2);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.4), 0 4px 6px -2px rgba(0,0,0,.2);
    --card-bg: #1e293b;
    --card-hover-bg: #263246;
    --usage-bg: #263246;
    --input-bg: #1e293b;
    --code-bg: #0d1117;
    --example-bg: #1c1a0a;
    --notes-bg: #0d1825;
    --params-bg: #1a2435;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  
  /* Header */
  .header { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #0ea5e9 100%); color: white; padding: 32px 24px 24px; text-align: center; position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
  .header-content { position: relative; max-width: 900px; margin: 0 auto; }
  .header h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; text-shadow: 0 2px 4px rgba(0,0,0,.2); }
  .header p { opacity: .85; font-size: 1rem; margin-bottom: 20px; }
  .header-stats { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
  .stat-badge { background: rgba(255,255,255,.15); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,.2); padding: 8px 20px; border-radius: 999px; font-size: 0.875rem; font-weight: 500; }
  .stat-badge span { font-weight: 700; font-size: 1.1rem; }
  
  /* Main Layout */
  .main { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
  
  /* Search Bar */
  .search-section { margin-bottom: 20px; }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.1rem; pointer-events: none; }
  #searchInput { width: 100%; padding: 14px 20px 14px 46px; border: 2px solid var(--border); border-radius: var(--radius); font-size: 1rem; background: var(--input-bg); color: var(--text); outline: none; transition: var(--transition); box-shadow: var(--shadow); }
  #searchInput:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
  #searchInput::placeholder { color: var(--text-muted); }
  
  /* Filter Tags */
  .filter-section { margin-bottom: 20px; }
  .filter-label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
  .filter-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 999px; font-size: 0.82rem; font-weight: 500; cursor: pointer; border: 1.5px solid transparent; transition: var(--transition); user-select: none; }
  .tag.active { border-color: currentColor; }
  .tag:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .tag-count { background: rgba(0,0,0,.12); padding: 1px 7px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
  
  /* Results Info */
  .results-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .results-count { font-size: 0.875rem; color: var(--text-muted); }
  .results-count strong { color: var(--text); }
  .sort-select { padding: 6px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 0.82rem; background: var(--surface); color: var(--text); cursor: pointer; outline: none; }
  
  /* Function Grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  
  /* Function Card */
  .card { background: var(--card-bg); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: var(--transition); position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: currentColor; opacity: 0; transition: var(--transition); }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: currentColor; background: var(--card-hover-bg); }
  .card:hover::before { opacity: 1; }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .card-name { font-family: 'Consolas', 'Courier New', monospace; font-size: 1.05rem; font-weight: 700; letter-spacing: .02em; }
  .card-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 999px; font-size: 0.72rem; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .card-desc { font-size: 0.875rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
  .card-usage { background: var(--usage-bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-family: monospace; font-size: 0.78rem; color: #1e40af; word-break: break-all; }
  [data-theme="dark"] .card-usage { color: #93c5fd; }
  .card-stars { font-size: 0.8rem; color: #f59e0b; margin-top: 8px; }
  .card-detail-badge { display: inline-flex; align-items: center; gap: 3px; margin-top: 8px; font-size: 0.72rem; color: var(--primary); background: #eff6ff; padding: 2px 8px; border-radius: 999px; }
  
  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 680px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 25px 50px rgba(0,0,0,.25); animation: slideUp .25s ease; }  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { padding: 24px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .modal-title { display: flex; flex-direction: column; gap: 6px; }
  .modal-fn-name { font-family: monospace; font-size: 1.5rem; font-weight: 700; }
  .modal-fn-desc { font-size: 0.9rem; color: var(--text-muted); }
  .modal-close { width: 32px; height: 32px; border: none; background: var(--bg); border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: var(--transition); flex-shrink: 0; }
  .modal-close:hover { background: var(--border); color: var(--text); }
  .modal-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .modal-screenshot-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border: 1.5px solid var(--border); border-radius: 999px; background: var(--surface); color: var(--text-muted); font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: var(--transition); white-space: nowrap; }
  .modal-screenshot-btn:hover { background: #eff6ff; border-color: var(--primary); color: var(--primary); }
  .modal-screenshot-btn.capturing { opacity: .6; pointer-events: none; }
  .screenshot-menu { position: absolute; top: 38px; right: 44px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.12); z-index: 9999; min-width: 160px; overflow: hidden; }
  .screenshot-menu button { display: flex; align-items: center; gap: 8px; width: 100%; padding: 10px 16px; border: none; background: none; cursor: pointer; font-size: 0.85rem; color: var(--text); transition: background .15s; white-space: nowrap; }
  .screenshot-menu button:hover { background: var(--bg); }
  .screenshot-menu .divider { height: 1px; background: var(--border); margin: 2px 0; }
  .modal-body { padding: 20px 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
  .modal-section { display: flex; flex-direction: column; gap: 6px; }
  .modal-section-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); }
  .modal-section-content { font-size: 0.9rem; line-height: 1.65; color: var(--text); }
  .usage-block { background: var(--code-bg); color: #a8d8ea; font-family: 'Consolas', monospace; font-size: 0.875rem; padding: 14px 16px; border-radius: var(--radius-sm); word-break: break-all; }
  .params-block { background: var(--params-bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 0.875rem; color: var(--text); line-height: 1.7; }
  .example-block { background: var(--example-bg); border: 1px solid #fde68a; border-radius: var(--radius-sm); padding: 12px 14px; font-size: 0.875rem; color: #92400e; line-height: 1.65; }
  [data-theme="dark"] .example-block { color: #fcd34d; border-color: #854d0e; }
  .notes-block { background: var(--notes-bg); border: 1px solid #bfdbfe; border-radius: var(--radius-sm); padding: 12px 14px; font-size: 0.875rem; color: #1e40af; line-height: 1.65; }
  [data-theme="dark"] .notes-block { color: #93c5fd; border-color: #1d4ed8; }
  .modal-cat-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 14px; border-radius: 999px; font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; }
  .stars-display { font-size: 1.1rem; color: #f59e0b; }
  
  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 3.5rem; margin-bottom: 16px; }
  .empty h3 { font-size: 1.1rem; margin-bottom: 6px; color: var(--text); }
  
  /* Responsive */
  @media (max-width: 640px) {
    .header h1 { font-size: 1.6rem; }
    .grid { grid-template-columns: 1fr; }
    .modal { max-height: 95vh; }
  }
  
  /* Copy button */
  .copy-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: rgba(255,255,255,.1); border: 1px solid rgba(37,99,235,.3); border-radius: 4px; font-size: 0.72rem; color: var(--primary); cursor: pointer; transition: var(--transition); margin-top: 4px; }
  .copy-btn:hover { background: #eff6ff; }
  
  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* ── 练习题角标 ── */
  .card-quiz-badge { display: inline-flex; align-items: center; gap: 3px; margin-top: 8px; font-size: 0.72rem; color: #d97706; background: #fffbeb; border: 1px solid #fde68a; padding: 2px 8px; border-radius: 999px; }

  /* ── 练习中心入口按钮 ── */
  .quiz-center-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; background: linear-gradient(135deg,#f59e0b,#d97706); color: #fff; border: none; border-radius: 999px; font-size: 0.88rem; font-weight: 600; cursor: pointer; box-shadow: 0 2px 8px rgba(217,119,6,.35); transition: var(--transition); }
  .quiz-center-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(217,119,6,.45); }

  /* ── 弹窗 Tab ── */
  .modal-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 24px; }
  .modal-tab { padding: 10px 18px; font-size: 0.875rem; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: var(--transition); white-space: nowrap; }
  .modal-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .modal-tab.quiz-tab.active { color: #d97706; border-bottom-color: #d97706; }
  .modal-tab-panel { display: none; }
  .modal-tab-panel.active { display: block; }

  /* ── 练习题面板 ── */
  .quiz-panel { padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; max-height: calc(90vh - 180px); }
  .quiz-progress-wrap { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: var(--text-muted); }
  .quiz-progress-bar { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .quiz-progress-fill { height: 100%; background: linear-gradient(90deg,#f59e0b,#10b981); border-radius: 3px; transition: width .4s ease; }
  .quiz-card { background: #fafafa; border: 1.5px solid var(--border); border-radius: 12px; padding: 18px; transition: var(--transition); }
  .quiz-card.answered-correct { border-color: #10b981; background: #f0fdf4; }
  .quiz-card.answered-wrong { border-color: #ef4444; background: #fef2f2; }
  .quiz-q-num { font-size: 0.72rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .quiz-q-text { font-size: 0.9rem; line-height: 1.7; color: var(--text); white-space: pre-wrap; font-family: inherit; margin-bottom: 14px; }
  .quiz-q-text code { font-family: 'Consolas', monospace; background: #1e1e3e; color: #a8d8ea; padding: 2px 7px; border-radius: 4px; font-size: 0.85em; }
  /* 选择题选项 */
  .quiz-options { display: flex; flex-direction: column; gap: 8px; }
  .quiz-option { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; transition: var(--transition); font-size: 0.875rem; background: #fff; }
  .quiz-option:hover:not(.disabled) { border-color: var(--primary); background: #eff6ff; }
  .quiz-option.selected-correct { border-color: #10b981 !important; background: #dcfce7 !important; color: #15803d; }
  .quiz-option.selected-wrong { border-color: #ef4444 !important; background: #fee2e2 !important; color: #b91c1c; }
  .quiz-option.show-correct { border-color: #10b981 !important; background: #f0fdf4 !important; color: #15803d; }
  .quiz-option.disabled { cursor: default; }
  .option-letter { font-weight: 700; font-size: 0.8rem; min-width: 20px; padding-top: 1px; }
  /* 填空题 */
  .quiz-fill-wrap { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .quiz-fill-input { flex: 1; min-width: 160px; padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'Consolas', monospace; font-size: 0.9rem; outline: none; transition: var(--transition); background: #fff; }
  .quiz-fill-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
  .quiz-fill-input.correct { border-color: #10b981 !important; background: #dcfce7; color: #15803d; }
  .quiz-fill-input.wrong { border-color: #ef4444 !important; background: #fee2e2; color: #b91c1c; }
  .quiz-submit-btn { padding: 9px 20px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: var(--transition); white-space: nowrap; }
  .quiz-submit-btn:hover { background: var(--primary-dark); }
  .quiz-submit-btn:disabled { opacity: .5; cursor: default; }
  /* 解析 */
  .quiz-explanation { display: none; margin-top: 12px; padding: 10px 14px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; font-size: 0.85rem; color: #92400e; line-height: 1.65; }
  .quiz-explanation.show { display: block; }
  .quiz-result-icon { font-size: 1.1rem; margin-right: 4px; }
  /* 已全部完成提示 */
  .quiz-all-done { text-align: center; padding: 40px 20px; }
  .quiz-all-done .done-icon { font-size: 3rem; margin-bottom: 12px; }
  .quiz-all-done h3 { font-size: 1.1rem; color: var(--text); margin-bottom: 6px; }
  .quiz-all-done p { font-size: 0.875rem; color: var(--text-muted); }
  .quiz-reset-btn { margin-top: 16px; padding: 8px 20px; background: #fffbeb; border: 1.5px solid #fde68a; color: #d97706; border-radius: 999px; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: var(--transition); }
  .quiz-reset-btn:hover { background: #fef3c7; }

  /* ── 练习中心弹窗 ── */
  .quiz-center-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; padding: 16px; }
  .quiz-center-overlay.open { display: flex; animation: fadeIn .2s ease; }
  .quiz-center-modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 760px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 25px 50px rgba(0,0,0,.25); animation: slideUp .25s ease; }
  .quiz-center-header { padding: 24px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .quiz-center-header h2 { font-size: 1.2rem; font-weight: 700; }
  .quiz-center-body { padding: 20px 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
  /* 总进度卡 */
  .qc-overview { display: flex; gap: 16px; flex-wrap: wrap; }
  .qc-stat { flex: 1; min-width: 100px; background: var(--bg); border-radius: 10px; padding: 14px 16px; text-align: center; }
  .qc-stat .val { font-size: 1.6rem; font-weight: 700; color: var(--text); }
  .qc-stat .lbl { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
  .qc-total-bar-wrap { margin-top: 4px; }
  .qc-total-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; }
  .qc-total-bar { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .qc-total-bar-fill { height: 100%; background: linear-gradient(90deg,#f59e0b,#10b981); border-radius: 5px; transition: width .6s ease; }
  /* 分类进度 */
  .qc-cat-section h3 { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
  .qc-cat-list { display: flex; flex-direction: column; gap: 10px; }
  .qc-cat-row { display: flex; align-items: center; gap: 10px; }
  .qc-cat-name { font-size: 0.875rem; min-width: 100px; color: var(--text); }
  .qc-cat-bar { flex: 1; height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .qc-cat-bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
  .qc-cat-count { font-size: 0.78rem; color: var(--text-muted); min-width: 40px; text-align: right; }
  /* 错题列表 */
  .qc-wrong-section h3 { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
  .qc-wrong-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .qc-wrong-item { padding: 4px 12px; background: #fee2e2; border: 1px solid #fca5a5; border-radius: 999px; font-size: 0.8rem; color: #b91c1c; cursor: pointer; transition: var(--transition); }
  .qc-wrong-item:hover { background: #fecaca; }
  .qc-empty-wrong { font-size: 0.875rem; color: #10b981; }

  /* ── 暗色模式切换按钮 ── */
  .theme-toggle { position: fixed; bottom: 24px; right: 24px; width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-md); transition: var(--transition); z-index: 999; }
  .theme-toggle:hover { box-shadow: var(--shadow-lg); transform: scale(1.08); color: var(--text); }

  /* ── 收藏夹 ── */
  .card-fav-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 1rem; cursor: pointer; padding: 2px; line-height: 1; opacity: 0.35; transition: var(--transition); z-index: 1; }
  .card:hover .card-fav-btn { opacity: 0.7; }
  .card-fav-btn.active, .card-fav-btn:hover { opacity: 1; }
  .card-fav-badge { display: inline-flex; align-items: center; gap: 3px; margin-top: 8px; font-size: 0.72rem; color: #e11d48; background: #fff1f2; border: 1px solid #fecdd3; padding: 2px 8px; border-radius: 999px; }
  [data-theme="dark"] .card-fav-badge { background: #1f0f14; border-color: #9f1239; }
  .modal-fav-btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; border: 1.5px solid var(--border); border-radius: 999px; background: var(--surface); color: var(--text-muted); font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: var(--transition); white-space: nowrap; }
  .modal-fav-btn:hover, .modal-fav-btn.active { background: #fff1f2; border-color: #fecdd3; color: #e11d48; }
  [data-theme="dark"] .modal-fav-btn:hover, [data-theme="dark"] .modal-fav-btn.active { background: #1f0f14; border-color: #9f1239; }

  /* ── 难度标签 ── */
  .card-diff-badge { display: inline-flex; align-items: center; gap: 3px; margin-top: 8px; font-size: 0.72rem; padding: 2px 8px; border-radius: 999px; border: 1px solid; }
  .diff-easy   { color: #059669; background: #ecfdf5; border-color: #6ee7b7; }
  .diff-medium { color: #d97706; background: #fffbeb; border-color: #fcd34d; }
  .diff-hard   { color: #dc2626; background: #fef2f2; border-color: #fca5a5; }
  [data-theme="dark"] .diff-easy   { color: #34d399; background: #052e20; border-color: #065f46; }
  [data-theme="dark"] .diff-medium { color: #fbbf24; background: #1c1509; border-color: #854d0e; }
  [data-theme="dark"] .diff-hard   { color: #f87171; background: #1f0707; border-color: #7f1d1d; }

  /* ── 相关函数推荐 ── */
  .related-fns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .related-fn-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 999px; font-family: 'Consolas', monospace; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: var(--transition); color: var(--text); }
  .related-fn-chip:hover { border-color: var(--primary); color: var(--primary); background: var(--surface); transform: translateY(-1px); }

  /* ── 筛选工具栏增加收藏/难度行 ── */
  .filter-toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .filter-toolbar-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 14px; border: 1.5px solid var(--border); border-radius: 999px; background: var(--surface); color: var(--text-muted); font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: var(--transition); }
  .filter-toolbar-btn:hover { border-color: var(--primary); color: var(--primary); }
  .filter-toolbar-btn.active { background: #eff6ff; border-color: var(--primary); color: var(--primary); }
  [data-theme="dark"] .filter-toolbar-btn.active { background: #1e3a5f; }
  .filter-toolbar-btn.fav-active { background: #fff1f2; border-color: #fecdd3; color: #e11d48; }
  [data-theme="dark"] .filter-toolbar-btn.fav-active { background: #1f0f14; border-color: #9f1239; }
  .difficulty-select { padding: 5px 12px; border: 1.5px solid var(--border); border-radius: 999px; font-size: 0.82rem; background: var(--surface); color: var(--text-muted); cursor: pointer; outline: none; transition: var(--transition); }
  .difficulty-select:focus { border-color: var(--primary); }

  /* ── 悬浮搜索快捷键提示 ── */
  .kbd { display: inline-flex; align-items: center; padding: 1px 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; font-size: 0.72rem; color: var(--text-muted); font-family: monospace; }

</style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <h1>📊 Excel 函数大全</h1>
    <p>交互式参考手册 · 快速搜索 · 分类浏览 · 详细说明</p>
    <div class="header-stats" id="headerStats"></div>
    <div style="margin-top:16px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;">
      <button class="quiz-center-btn" onclick="openQuizCenter()">🎯 练习中心 · 查看学习进度</button>
      <button class="quiz-center-btn" style="background:linear-gradient(135deg,#e11d48,#be185d);" onclick="openWrongBook()">📕 错题本</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="search-section">
    <div class="search-wrap">
      <span class="search-icon">🔎</span>
      <input type="text" id="searchInput" placeholder="搜索函数名称或功能描述，例如：VLOOKUP、查找、日期..." autocomplete="off">
    </div>
  </div>
  
  <div class="filter-section">
    <div class="filter-label">函数分类</div>
    <div class="filter-tags" id="filterTags"></div>
  </div>

  <div class="filter-toolbar">
    <button class="filter-toolbar-btn" id="favFilterBtn" onclick="toggleFavFilter()">⭐ 我的收藏</button>
    <select class="difficulty-select" id="diffSelect" onchange="render()">
      <option value="all">全部难度</option>
      <option value="easy">🟢 入门</option>
      <option value="medium">🟡 进阶</option>
      <option value="hard">🔴 高级</option>
    </select>
  </div>
  
  <div class="results-info">
    <div class="results-count" id="resultsCount"></div>
    <select class="sort-select" id="sortSelect">
      <option value="name">按名称排序</option>
      <option value="category">按分类排序</option>
      <option value="detail">优先显示有详情的</option>
      <option value="fav">收藏优先</option>
    </select>
  </div>
  
  <div class="grid" id="functionGrid"></div>
  <div class="empty" id="emptyState" style="display:none;">
    <div class="empty-icon">🔍</div>
    <h3>未找到匹配的函数</h3>
    <p>请尝试其他关键词或清除筛选条件</p>
  </div>
</div>

<!-- 函数详情 Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">
        <div class="modal-fn-name" id="modalName"></div>
        <div class="modal-fn-desc" id="modalDesc"></div>
      </div>
      <div class="modal-actions" style="position:relative;">
        <button class="modal-fav-btn" id="modalFavBtn" onclick="toggleModalFav()">☆ 收藏</button>
        <button class="modal-screenshot-btn" id="screenshotBtn" onclick="toggleScreenshotMenu(event)">📷 截图 ▾</button>
        <div class="screenshot-menu" id="screenshotMenu" style="display:none;">
          <button onclick="doScreenshot('clipboard')">📋 复制到剪贴板</button>
          <div class="divider"></div>
          <button onclick="doScreenshot('savepicker')">💾 另存为…（推荐）</button>
          <button onclick="doScreenshot('download')">⬇️ 直接下载</button>
        </div>
        <button class="modal-close" onclick="closeModalBtn()">✕</button>
      </div>
    </div>
    <!-- Tab 导航 -->
    <div class="modal-tabs" id="modalTabs">
      <div class="modal-tab active" data-tab="detail" onclick="switchTab('detail')">📖 函数详情</div>
      <div class="modal-tab quiz-tab" id="quizTabBtn" data-tab="quiz" onclick="switchTab('quiz')" style="display:none;">📝 练习题 <span id="quizTabBadge" style="font-size:0.7rem;background:#fef3c7;color:#d97706;padding:1px 6px;border-radius:999px;margin-left:4px;"></span></div>
    </div>
    <!-- 详情面板 -->
    <div class="modal-tab-panel active" id="panel-detail">
      <div class="modal-body" id="modalBody"></div>
    </div>
    <!-- 练习题面板 -->
    <div class="modal-tab-panel" id="panel-quiz">
      <div class="quiz-panel" id="quizPanel"></div>
    </div>
  </div>
</div>

<!-- 练习中心弹窗 -->
<div class="quiz-center-overlay" id="quizCenter" onclick="closeQuizCenterOverlay(event)">
  <div class="quiz-center-modal">
    <div class="quiz-center-header">
      <h2>🎯 练习中心</h2>
      <button class="modal-close" onclick="closeQuizCenter()">✕</button>
    </div>
    <div class="quiz-center-body" id="quizCenterBody"></div>
  </div>
</div>

<!-- 错题本弹窗 -->
<div class="quiz-center-overlay" id="wrongBookModal" onclick="closeWrongBook(event)">
  <div class="quiz-center-modal">
    <div class="quiz-center-header">
      <h2>📕 错题本</h2>
      <button class="modal-close" onclick="closeWrongBookBtn()">✕</button>
    </div>
    <div class="quiz-center-body" id="wrongBookBody"></div>
  </div>
</div>

<!-- 暗色模式切换按钮 -->
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换暗色/亮色模式">🌙</button>

const FAV_KEY = 'excel_fav_v1';
function loadFavs() { try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); } catch(e) { return []; } }
function saveFavs(arr) { localStorage.setItem(FAV_KEY, JSON.stringify(arr)); }
let favSet = new Set(loadFavs());

function toggleFav(fnName, e) {
  if (e) e.stopPropagation();
  if (favSet.has(fnName)) favSet.delete(fnName); else favSet.add(fnName);
  saveFavs([...favSet]);
  render();
  updateModalFavBtn(fnName);
}

function toggleFavFilter() {
  showFavOnly = !showFavOnly;
  const btn = document.getElementById('favFilterBtn');
  btn.classList.toggle('fav-active', showFavOnly);
  render();
}

function updateModalFavBtn(fnName) {
  const btn = document.getElementById('modalFavBtn');
  if (!btn) return;
  const isFav = favSet.has(fnName);
  btn.innerHTML = isFav ? '⭐ 已收藏' : '☆ 收藏';
  btn.classList.toggle('active', isFav);
}

function toggleModalFav() {
  if (!currentModalFn) return;

}

const THEME_KEY = 'excel_theme_v1';
function loadTheme() {
  const t = localStorage.getItem(THEME_KEY);
  if (t) document.documentElement.setAttribute('data-theme', t);
  updateThemeBtn();
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(THEME_KEY, next);
  updateThemeBtn();
}
function updateThemeBtn() {
  const btn = document.getElementById('themeToggle');
  if (!btn) return;
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  btn.textContent = isDark ? '☀️' : '🌙';
  btn.title = isDark ? '切换到亮色模式' : '切换到暗色模式';
}

// Build filter tags
const tagContainer = document.getElementById('filterTags');

const catOrder = ['日期与时间函数','数学与三角函数','逻辑函数','查找与引用函数','数据库函数','文本函数','统计函数','财务函数','工程函数','信息函数','外部函数','其他函数'];
catOrder.forEach(cat => {
  const meta = CAT_META[cat] || { icon: '📦', color: '#6b7280', bg: '#f9fafb' };
  const count = CAT_COUNTS[cat] || 0;
  if (count === 0) return;
  const tag = createTag(cat, meta.icon + ' ' + cat, count, meta.color, meta.bg, false);
  tagContainer.appendChild(tag);
});

function createTag(cat, label, count, color, bg, active) {
  const tag = document.createElement('div');
  tag.className = 'tag' + (active ? ' active' : '');
  tag.style.color = color;
  tag.style.backgroundColor = bg;
  tag.innerHTML = `${label} <span class="tag-count">${count}</span>`;
  tag.onclick = () => setCategory(cat);
  tag._cat = cat;
  return tag;
}

function setCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.tag').forEach(t => {
    const isActive = t._cat === cat;
    t.classList.toggle('active', isActive);
  });
  render();
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase();
  render();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  sortMode = e.target.value;
  render();
});
function getFiltered() {
  let fns = FUNCTIONS;
  if (activeCategory !== 'all') fns = fns.filter(f => f.category === activeCategory);
  if (searchQuery) {
    fns = fns.filter(f =>
      f.name.toLowerCase().includes(searchQuery) ||
      f.description.toLowerCase().includes(searchQuery) ||
      f.category.includes(searchQuery) ||
      (f.usage && f.usage.toLowerCase().includes(searchQuery)) ||
      (f.params && f.params.toLowerCase().includes(searchQuery)) ||
      (f.example && f.example.toLowerCase().includes(searchQuery))
    );
  }
  if (showFavOnly) fns = fns.filter(f => favSet.has(f.name));
  const diff = document.getElementById('diffSelect') ? document.getElementById('diffSelect').value : 'all';
  if (diff !== 'all') fns = fns.filter(f => DIFFICULTY[f.name] === diff);
  if (sortMode === 'name') fns = [...fns].sort((a,b) => a.name.localeCompare(b.name));
  else if (sortMode === 'category') fns = [...fns].sort((a,b) => a.category.localeCompare(b.category) || a.name.localeCompare(b.name));
  else if (sortMode === 'detail') fns = [...fns].sort((a,b) => (b.hasDetail?1:0)-(a.hasDetail?1:0) || a.name.localeCompare(b.name));
  else if (sortMode === 'fav') fns = [...fns].sort((a,b) => (favSet.has(b.name)?1:0)-(favSet.has(a.name)?1:0) || a.name.localeCompare(b.name));
  return fns;
}

      <div class="card" style="color:${meta.color}" onclick="openModal('${escHtml(f.name)}')">
        <button class="card-fav-btn ${isFav ? 'active' : ''}" title="${isFav ? '取消收藏' : '收藏'}" onclick="toggleFav('${escHtml(f.name)}', event)">${isFav ? '⭐' : '☆'}</button>
        <div class="card-header">
          <div class="card-name" style="color:${meta.color}">${escHtml(f.name)}</div>
          <div class="card-badge" style="background:${meta.bg};color:${meta.color}">${meta.icon} ${escHtml(f.category)}</div>
        </div>
        <div class="card-desc">${escHtml(f.description)}</div>
        ${usageHtml}
        ${starsHtml}
        ${detailBadge}
        ${quizBadge}
        ${diffBadge}
        ${favBadge}
      </div>
    `;
  }).join('');
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  if (hasQuiz) {

    body += `<div class="modal-section">

      <button class="copy-btn" onclick="copyText('${escHtml(f.usage)}')">📋 复制语法</button>

  if (f.params) {
    body += `<div class="modal-section">
      <div class="modal-section-label">参数说明</div>
      <div class="params-block">${escHtml(f.params)}</div>
    </div>`;
  }
  
  if (f.notes) {
    body += `<div class="modal-section">
      <div class="modal-section-label">注意事项</div>
      <div class="notes-block">${escHtml(f.notes)}</div>
    </div>`;
  }
  
  if (f.example) {
    body += `<div class="modal-section">
      <div class="modal-section-label">应用实例</div>
      <div class="example-block">${escHtml(f.example)}</div>
    </div>`;
  }
  
  if (!f.usage && !f.params && !f.notes && !f.example) {
    body += `<div class="modal-section">
      <div class="modal-section-label">功能描述</div>

    </div>`;
  }

  if (hasQuiz) {

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = '✅ 已复制';
    setTimeout(() => { btn.textContent = '📋 复制语法'; }, 1500);
  });
}

// ── 截图功能 ──────────────────────────────────────────────
function toggleScreenshotMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('screenshotMenu');
  const isOpen = menu.style.display !== 'none';
  menu.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) {
    // 点击其他地方关闭菜单
    const close = () => { menu.style.display = 'none'; document.removeEventListener('click', close); };
    setTimeout(() => document.addEventListener('click', close), 0);
  }
}

function doScreenshot(mode) {
  document.getElementById('screenshotMenu').style.display = 'none';
  const btn = document.getElementById('screenshotBtn');
  const modal = document.querySelector('.modal');
  const fnName = document.getElementById('modalName').textContent.trim() || 'function';

  btn.classList.add('capturing');
  btn.textContent = '⏳ 生成中…';

  requestAnimationFrame(() => {
    setTimeout(() => {
      try {
        const canvas = buildCanvas(modal);
        canvas.toBlob(blob => {
          if (mode === 'clipboard') {
            copyBlobToClipboard(blob, btn);
          } else if (mode === 'savepicker') {
            saveWithPicker(blob, fnName, btn);
          } else {
            downloadBlob(blob, fnName, btn);
          }
        }, 'image/png');
      } catch(e) {
        alert('截图失败：' + e.message);
        btn.classList.remove('capturing');
        btn.innerHTML = '📷 截图 ▾';
      }
    }, 60);
  });
}

// 复制到剪贴板（最推荐，无文件安全问题）
async function copyBlobToClipboard(blob, btn) {
  try {
    await navigator.clipboard.write([
      new ClipboardItem({ 'image/png': blob })
    ]);
    btn.classList.remove('capturing');
    btn.innerHTML = '✅ 已复制';
    setTimeout(() => { btn.innerHTML = '📷 截图 ▾'; }, 2000);
  } catch(e) {
    // 剪贴板权限被拒绝，降级到下载
    alert('剪贴板复制失败（需要HTTPS或浏览器权限），已改为直接下载。\n如需复制，请在浏览器地址栏点击🔒图标允许剪贴板权限。');
    const fnName = document.getElementById('modalName').textContent.trim() || 'function';
    downloadBlob(blob, fnName, btn);
  }
}

// 用系统文件选择器另存（保存的文件不含 Zone.Identifier 安全标记）
async function saveWithPicker(blob, fnName, btn) {
  if (!window.showSaveFilePicker) {
    // 不支持时降级到下载
    downloadBlob(blob, fnName, btn);
    return;
  }
  try {
    const handle = await window.showSaveFilePicker({
      suggestedName: 'Excel函数_' + fnName + '.png',
      types: [{ description: 'PNG 图片', accept: { 'image/png': ['.png'] } }]
    });
    const writable = await handle.createWritable();
    await writable.write(blob);
    await writable.close();
    btn.classList.remove('capturing');
    btn.innerHTML = '✅ 已保存';
    setTimeout(() => { btn.innerHTML = '📷 截图 ▾'; }, 2000);
  } catch(e) {
    // 用户取消或不支持
    if (e.name !== 'AbortError') {
      downloadBlob(blob, fnName, btn);
    } else {
      btn.classList.remove('capturing');
      btn.innerHTML = '📷 截图 ▾';
    }
  }
}

// 直接下载（部分情况下Windows安全策略可能拦截）
function downloadBlob(blob, fnName, btn) {
  const blobUrl = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.download = 'Excel函数_' + fnName + '.png';
  link.href = blobUrl;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
  btn.classList.remove('capturing');
  btn.innerHTML = '✅ 已下载';
  setTimeout(() => { btn.innerHTML = '📷 截图 ▾'; }, 2000);
}

function screenshotElement(el, fnName, btn) {
  const canvas = buildCanvas(el);
  canvas.toBlob(blob => {
    downloadBlob(blob, fnName, btn);
  }, 'image/png');
}

function buildCanvas(el) {
  // 收集所有 section 内容（不依赖 html2canvas）
  const sections = el.querySelectorAll('.modal-header, .modal-section');
  
  // ── Canvas 绘制参数 ──
  const W = 700;
  const PADDING = 32;
  const INNER_W = W - PADDING * 2;
  const FONT_BODY = '14px -apple-system, "Microsoft YaHei", sans-serif';
  const FONT_MONO = '13px Consolas, "Courier New", monospace';

  // 先用临时 canvas 测量文字高度
  const tmpC = document.createElement('canvas');
  const tmpCtx = tmpC.getContext('2d');

  function measureTextLines(ctx, text, maxW, font) {
    ctx.font = font;
    const words = text.split('');
    let line = '', lines = [];
    for (let ch of words) {
      const test = line + ch;
      if (ctx.measureText(test).width > maxW && line) {
        lines.push(line);
        line = ch;
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
    return lines;
  }

  // 提取结构化数据
  const fnNameText  = document.getElementById('modalName').textContent;
  const fnDescText  = document.getElementById('modalDesc').textContent;
  const catBadge    = el.querySelector('.modal-cat-badge');
  const catText     = catBadge ? catBadge.textContent.trim() : '';
  // 用 getComputedStyle 读取 badge 的实际渲染颜色（CSS background 简写无法通过 .style 读取）
  const catBadgeStyle = catBadge ? window.getComputedStyle(catBadge) : null;
  const catBgColor  = catBadgeStyle ? catBadgeStyle.backgroundColor : 'rgba(239,246,255,1)';
  const catFgColor  = catBadgeStyle ? catBadgeStyle.color : '#2563eb';
  const starsEl     = el.querySelector('.stars-display');
  const starsText   = starsEl ? starsEl.textContent.trim() : '';
  const fnColor     = document.getElementById('modalName').style.color || '#2563eb';

  // 收集各 section
  const sectionData = [];
  el.querySelectorAll('.modal-section').forEach(sec => {
    const label = sec.querySelector('.modal-section-label');
    const usageBlock  = sec.querySelector('.usage-block');
    const paramsBlock = sec.querySelector('.params-block');
    const exBlock     = sec.querySelector('.example-block');
    const notesBlock  = sec.querySelector('.notes-block');
    const plainBlock  = sec.querySelector('.modal-section-content');

    if (!label) return;
    const labelText = label.textContent.trim();
    let content = '', type = 'plain';

    if (usageBlock)  { content = usageBlock.textContent.trim();  type = 'code'; }
    else if (paramsBlock) { content = paramsBlock.textContent.trim(); type = 'params'; }
    else if (exBlock)    { content = exBlock.textContent.trim();     type = 'example'; }
    else if (notesBlock) { content = notesBlock.textContent.trim();  type = 'notes'; }
    else if (plainBlock) { content = plainBlock.textContent.trim();  type = 'plain'; }

    if (content) sectionData.push({ label: labelText, content, type });
  });

  // ── 计算总高度 ──
  const LINE_H = 22;
  const BLOCK_PADDING = 12;
  let totalH = 0;

  // 顶部 header 区：名称 + 描述 + 标签
  totalH += PADDING;       // top pad
  totalH += 40;            // fn name
  totalH += 24;            // fn desc
  totalH += 10;            // gap
  if (catText) totalH += 28;
  if (starsText) totalH += 24;
  totalH += 20;            // divider gap

  sectionData.forEach(s => {
    totalH += 20;  // label
    totalH += 6;   // gap

    const font = s.type === 'code' ? FONT_MONO : FONT_BODY;
    const textW = INNER_W - BLOCK_PADDING * 2;
    const lines = measureTextLines(tmpCtx, s.content, textW, font);
    totalH += lines.length * LINE_H + BLOCK_PADDING * 2;
    totalH += 16; // section gap
  });

  totalH += PADDING; // bottom pad

  // ── 绘制 ──
  const canvas = document.createElement('canvas');
  const DPR = 2; // retina
  canvas.width  = W * DPR;
  canvas.height = totalH * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = totalH + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);

  // 背景
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, totalH);

  // 顶部彩色条
  const grad = ctx.createLinearGradient(0, 0, W, 0);
  grad.addColorStop(0, '#1e3a8a');
  grad.addColorStop(0.5, '#2563eb');
  grad.addColorStop(1, '#0ea5e9');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, 6);

  let y = PADDING;

  // 函数名
  ctx.font = 'bold 26px Consolas, "Courier New", monospace';
  ctx.fillStyle = fnColor || '#2563eb';
  ctx.fillText(fnNameText, PADDING, y + 28);
  y += 40;

  // 描述
  ctx.font = FONT_BODY;
  ctx.fillStyle = '#64748b';
  ctx.fillText(fnDescText, PADDING, y + 16);
  y += 24 + 10;

  // 分类标签（使用从 DOM 读取的实际颜色，确保与页面一致且对比度足够）
  if (catText) {
    ctx.font = 'bold 12px -apple-system, "Microsoft YaHei", sans-serif';
    const badgeW = ctx.measureText(catText).width + 28;
    // 背景：使用实际背景色
    roundRect(ctx, PADDING, y, badgeW, 22, 11);
    ctx.fillStyle = catBgColor;
    ctx.fill();
    // 文字：对原始颜色加深以确保对比度（将 rgb 通道乘以 0.6 得到深色版本）
    ctx.fillStyle = darkenRgbColor(catFgColor, 0.55);
    ctx.fillText(catText, PADDING + 14, y + 15);
    y += 28;
  }

  // 星级
  if (starsText) {
    ctx.font = '16px serif';
    ctx.fillStyle = '#f59e0b';
    ctx.fillText(starsText, PADDING, y + 16);
    y += 24;
  }

  // 分隔线
  ctx.strokeStyle = '#e2e8f0';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PADDING, y + 6);
  ctx.lineTo(W - PADDING, y + 6);
  ctx.stroke();
  y += 20;

  // 各 section
  const typeStyles = {
    code:    { bg: '#1e1e3e', text: '#a8d8ea', label: '#94a3b8' },
    params:  { bg: '#fafafa', text: '#374151', label: '#6366f1' },
    example: { bg: '#fffbeb', text: '#92400e', label: '#d97706' },
    notes:   { bg: '#eff6ff', text: '#1e40af', label: '#3b82f6' },
    plain:   { bg: '#f8fafc', text: '#1e293b', label: '#64748b' },
  };

  sectionData.forEach(s => {
    const st = typeStyles[s.type] || typeStyles.plain;

    // Label
    ctx.font = 'bold 11px -apple-system, "Microsoft YaHei", sans-serif';
    ctx.fillStyle = st.label;
    ctx.fillText(s.label.toUpperCase(), PADDING, y + 14);
    y += 20 + 6;

    // Block background
    const font = s.type === 'code' ? FONT_MONO : FONT_BODY;
    const textW = INNER_W - BLOCK_PADDING * 2;
    const lines = measureTextLines(tmpCtx, s.content, textW, font);
    const blockH = lines.length * LINE_H + BLOCK_PADDING * 2;

    roundRect(ctx, PADDING, y, INNER_W, blockH, 6);
    ctx.fillStyle = st.bg;
    ctx.fill();

    // Text
    ctx.font = font;
    ctx.fillStyle = st.text;
    lines.forEach((line, i) => {
      ctx.fillText(line, PADDING + BLOCK_PADDING, y + BLOCK_PADDING + (i + 1) * LINE_H - 4);
    });

    y += blockH + 16;
  });

  // 底部水印
  ctx.font = '11px -apple-system, "Microsoft YaHei", sans-serif';
  ctx.fillStyle = '#cbd5e1';
  const watermark = 'Excel 函数大全 · 交互式参考手册';
  const wmW = ctx.measureText(watermark).width;
  ctx.fillText(watermark, W - PADDING - wmW, totalH - 12);

  return canvas;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// 将 computed rgb(...) 颜色加深，factor 越小越深（0.55 = 55% 亮度）
function darkenRgbColor(rgbStr, factor) {
  const m = (rgbStr || '').match(/\d+/g);
  if (m && m.length >= 3) {
    const r = Math.round(parseInt(m[0]) * factor);
    const g = Math.round(parseInt(m[1]) * factor);
    const b = Math.round(parseInt(m[2]) * factor);
    return `rgb(${r},${g},${b})`;
  }
  return '#1e293b'; // 默认深色兜底
}

function lightenColor(hex, amount) {
  // convert color to rgba with high alpha (light bg)
  try {
    const tmp = document.createElement('div');
    tmp.style.color = hex;
    document.body.appendChild(tmp);
    const computed = getComputedStyle(tmp).color;
    document.body.removeChild(tmp);
    const m = computed.match(/\d+/g);
    if (m) return `rgba(${m[0]},${m[1]},${m[2]},${amount})`;
  } catch(e) {}
  return '#eff6ff';
}

// ── 答题记录（存 localStorage）─────────────────────────────
const STORAGE_KEY = 'excel_quiz_v1';
function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveProgress(prog) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(prog));
}

let quizProgress = loadProgress();
// 结构：{ fnName: { 0: { answered: bool, correct: bool }, 1: {...} } }

function getQuizStats() {
  let total = 0, done = 0, correct = 0, wrong = [];
  Object.keys(QUIZ_DATA).forEach(fn => {
    QUIZ_DATA[fn].forEach((q, i) => {
      total++;
      const rec = (quizProgress[fn] || {})[i];
      if (rec && rec.answered) {
        done++;
        if (rec.correct) correct++; else wrong.push(fn);
      }
    });
  });
  return { total, done, correct, wrong: [...new Set(wrong)] };
}

// ── Tab 切换 ────────────────────────────────────────────────
let currentModalFn = null;
function switchTab(tab) {
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.modal-tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
  if (tab === 'quiz' && currentModalFn) renderQuizPanel(currentModalFn);
}

// ── 渲染函数卡片时加练习题角标 ──────────────────────────────
// 在 render() 之后 patch，通过修改 detailBadge 逻辑实现
// （在原始 render 函数里已有 detailBadge，我们在 openModal 里单独处理）

// ── 渲染练习题面板 ──────────────────────────────────────────
function renderQuizPanel(fnName) {
  const panel = document.getElementById('quizPanel');
  const qs = QUIZ_DATA[fnName];
  if (!qs || qs.length === 0) {
    panel.innerHTML = '<div style="padding:40px 24px;text-align:center;color:var(--text-muted);">该函数暂无练习题</div>';
    return;
  }
  const prog = quizProgress[fnName] || {};
  const doneCount = Object.values(prog).filter(r => r && r.answered).length;
  const pct = Math.round(doneCount / qs.length * 100);

  let html = `<div class="quiz-progress-wrap">
    <span>完成 ${doneCount}/${qs.length}</span>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    <span>${pct}%</span>
  </div>`;

  qs.forEach((q, idx) => {
    const rec = prog[idx] || {};
    const answered = !!rec.answered;
    const cardClass = answered ? (rec.correct ? 'answered-correct' : 'answered-wrong') : '';
    html += `<div class="quiz-card ${cardClass}" id="qcard-${fnName}-${idx}">`;
    html += `<div class="quiz-q-num">第 ${idx+1} 题 · ${q.type === 'choice' ? '单选题' : '填空题'}</div>`;
    html += `<div class="quiz-q-text">${escHtml(q.question)}</div>`;

    if (q.type === 'choice') {
      html += `<div class="quiz-options">`;
      const letters = ['A','B','C','D'];
      q.options.forEach((opt, oi) => {
        let cls = '';
        if (answered) {
          if (oi === q.answer) cls = 'show-correct';
          else if (oi === rec.chosen) cls = 'selected-wrong';
        }
        html += `<div class="quiz-option ${cls} ${answered ? 'disabled' : ''}" onclick="${answered ? '' : `chooseOption('${fnName}',${idx},${oi})`}">
          <span class="option-letter">${letters[oi]}</span>
          <span>${escHtml(opt)}</span>
        </div>`;
      });
      html += `</div>`;
    } else {
      const inputVal = answered ? (rec.correct ? q.answer : rec.userInput) : '';
      const inputCls = answered ? (rec.correct ? 'correct' : 'wrong') : '';
      html += `<div class="quiz-fill-wrap">
        <input class="quiz-fill-input ${inputCls}" id="fill-${fnName}-${idx}" type="text"
          value="${escHtml(inputVal)}" placeholder="在此输入答案…" ${answered ? 'readonly' : ''}
          onkeydown="if(event.key==='Enter')submitFill('${fnName}',${idx})">
        <button class="quiz-submit-btn" ${answered ? 'disabled' : ''} onclick="submitFill('${fnName}',${idx})">提交</button>
      </div>`;
    }

    // 解析
    if (answered) {
      const icon = rec.correct ? '✅' : '❌';
      const tip = rec.correct ? '回答正确！' : `正确答案：${q.type === 'choice' ? ['A','B','C','D'][q.answer] + '. ' + q.options[q.answer] : q.answer}`;
      html += `<div class="quiz-explanation show"><span class="quiz-result-icon">${icon}</span><strong>${tip}</strong><br>${escHtml(q.explanation)}</div>`;
    } else {
      html += `<div class="quiz-explanation" id="exp-${fnName}-${idx}"></div>`;
    }

    html += `</div>`;
  });

  // 重置按钮
  if (doneCount > 0) {
    html += `<div style="text-align:center;padding-bottom:8px;"><button class="quiz-reset-btn" onclick="resetFnQuiz('${fnName}')">🔄 重置本函数练习</button></div>`;
  }

  panel.innerHTML = html;
}

function chooseOption(fnName, idx, chosen) {
  const q = QUIZ_DATA[fnName][idx];
  const correct = chosen === q.answer;
  if (!quizProgress[fnName]) quizProgress[fnName] = {};
  quizProgress[fnName][idx] = { answered: true, correct, chosen };
  saveProgress(quizProgress);
  renderQuizPanel(fnName);
  updateQuizTabBadge(fnName);
}

function submitFill(fnName, idx) {
  const q = QUIZ_DATA[fnName][idx];
  const input = document.getElementById(`fill-${fnName}-${idx}`);
  if (!input) return;
  const userInput = input.value.trim();
  if (!userInput) { input.focus(); return; }
  // 答案比较（忽略空白、忽略大小写）
  const correct = userInput.toLowerCase().replace(/\s/g,'') === q.answer.toLowerCase().replace(/\s/g,'');
  if (!quizProgress[fnName]) quizProgress[fnName] = {};
  quizProgress[fnName][idx] = { answered: true, correct, userInput };
  saveProgress(quizProgress);
  renderQuizPanel(fnName);
  updateQuizTabBadge(fnName);
}

function resetFnQuiz(fnName) {
  if (!confirm(`确认重置 ${fnName} 的练习记录？`)) return;
  delete quizProgress[fnName];
  saveProgress(quizProgress);
  renderQuizPanel(fnName);
  updateQuizTabBadge(fnName);
}

function updateQuizTabBadge(fnName) {
  const qs = QUIZ_DATA[fnName] || [];
  const prog = quizProgress[fnName] || {};
  const done = Object.values(prog).filter(r => r && r.answered).length;
  const badge = document.getElementById('quizTabBadge');
  if (badge) badge.textContent = `${done}/${qs.length}`;
}

// ── 练习中心 ────────────────────────────────────────────────
function openQuizCenter() {
  renderQuizCenter();
  document.getElementById('quizCenter').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeQuizCenter() {
  document.getElementById('quizCenter').classList.remove('open');
  document.body.style.overflow = '';
}
function closeQuizCenterOverlay(e) {
  if (e.target === document.getElementById('quizCenter')) closeQuizCenter();
}

function renderQuizCenter() {
  const stats = getQuizStats();
  const pct = stats.total ? Math.round(stats.done / stats.total * 100) : 0;
  const correctPct = stats.done ? Math.round(stats.correct / stats.done * 100) : 0;

  // 分类统计
  const catStats = {};
  Object.keys(QUIZ_DATA).forEach(fn => {
    const cat = (FUNCTIONS.find(f => f.name === fn) || {}).category || '其他';
    if (!catStats[cat]) catStats[cat] = { total: 0, done: 0 };
    QUIZ_DATA[fn].forEach((q, i) => {
      catStats[cat].total++;
      const rec = (quizProgress[fn] || {})[i];
      if (rec && rec.answered) catStats[cat].done++;
    });
  });

  const catColors = ['#f59e0b','#10b981','#3b82f6','#8b5cf6','#ef4444','#14b8a6'];
  let catHtml = '';
  Object.keys(catStats).forEach((cat, ci) => {
    const s = catStats[cat];
    const p = s.total ? Math.round(s.done / s.total * 100) : 0;
    const col = catColors[ci % catColors.length];
    catHtml += `<div class="qc-cat-row">
      <div class="qc-cat-name">${cat}</div>
      <div class="qc-cat-bar"><div class="qc-cat-bar-fill" style="width:${p}%;background:${col}"></div></div>
      <div class="qc-cat-count">${s.done}/${s.total}</div>
    </div>`;
  });

  const wrongHtml = stats.wrong.length
    ? stats.wrong.map(fn => `<span class="qc-wrong-item" onclick="closeQuizCenter();openModal('${fn}');setTimeout(()=>switchTab('quiz'),100)">${fn}</span>`).join('')
    : '<span class="qc-empty-wrong">🎉 暂无错题，保持！</span>';

  document.getElementById('quizCenterBody').innerHTML = `
    <div class="qc-overview">
      <div class="qc-stat"><div class="val">${stats.total}</div><div class="lbl">题目总数</div></div>
      <div class="qc-stat"><div class="val">${stats.done}</div><div class="lbl">已完成</div></div>
      <div class="qc-stat"><div class="val">${stats.correct}</div><div class="lbl">答对题数</div></div>
      <div class="qc-stat"><div class="val">${correctPct}%</div><div class="lbl">正确率</div></div>
    </div>
    <div class="qc-total-bar-wrap">
      <div class="qc-total-label"><span>总体完成进度</span><span>${pct}%（${stats.done}/${stats.total}）</span></div>
      <div class="qc-total-bar"><div class="qc-total-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="qc-cat-section"><h3>分类进度</h3><div class="qc-cat-list">${catHtml}</div></div>
    <div class="qc-wrong-section"><h3>错题列表（点击可跳转练习）</h3><div class="qc-wrong-list">${wrongHtml}</div></div>
  `;
}

}
function closeWrongBook(e) {
  if (e.target === document.getElementById('wrongBookModal')) closeWrongBookBtn();
}

function renderWrongBook() {
  const container = document.getElementById('wrongBookBody');
  const wrongItems = [];
  Object.keys(QUIZ_DATA).forEach(fn => {
    QUIZ_DATA[fn].forEach((q, i) => {
      const rec = (quizProgress[fn] || {})[i];
      if (rec && rec.answered && !rec.correct) {
        wrongItems.push({ fn, idx: i, q, rec });
      }
    });
  });

  if (wrongItems.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:60px 20px;">
      <div style="font-size:3rem;margin-bottom:12px;">🎉</div>
      <h3 style="color:var(--text);margin-bottom:8px;">暂无错题</h3>
      <p style="color:var(--text-muted);font-size:0.875rem;">所有已做题目均答对了，继续保持！</p>
    </div>`;
    return;
  }

  const fnCount = [...new Set(wrongItems.map(w=>w.fn))].length;
  const stats = `<div style="background:var(--bg);border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
    <div><span style="font-size:1.4rem;font-weight:700;color:#dc2626;">${wrongItems.length}</span><span style="font-size:0.8rem;color:var(--text-muted);margin-left:4px;">道错题</span></div>
    <div style="font-size:0.85rem;color:var(--text-muted);">来自 ${fnCount} 个函数</div>
    <button onclick="resetAllWrong()" style="margin-left:auto;padding:6px 14px;background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;border-radius:999px;font-size:0.78rem;cursor:pointer;font-weight:600;">🔄 清空错题本</button>
  </div>`;

  let cardsHtml = wrongItems.map(({fn, idx, q, rec}) => {
    const meta = CAT_META[(FUNCTIONS.find(f=>f.name===fn)||{}).category] || CAT_META['其他函数'];
    const letters = ['A','B','C','D'];
    let answerDisplay = '';
    if (q.type === 'choice') {
      answerDisplay = `正确答案：<strong>${letters[q.answer]}. ${escHtml(q.options[q.answer])}</strong>`;
      const yourChoice = rec.chosen !== undefined ? `${letters[rec.chosen]}. ${escHtml(q.options[rec.chosen]||'?')}` : '未选择';
      answerDisplay += `<br>你的回答：<span style="color:#dc2626;">${yourChoice}</span>`;
    } else {
      answerDisplay = `正确答案：<strong style="font-family:monospace;">${escHtml(q.answer)}</strong>`;
      answerDisplay += `<br>你的回答：<span style="color:#dc2626;font-family:monospace;">${escHtml(rec.userInput||'')}</span>`;
    }
    return `<div class="quiz-card answered-wrong" style="margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
        <span style="font-family:monospace;font-size:0.9rem;font-weight:700;color:${meta.color};cursor:pointer;text-decoration:underline;" onclick="closeWrongBookBtn();setTimeout(()=>{openModal('${fn}');setTimeout(()=>switchTab('quiz'),100)},50)">${fn}</span>
        <span style="font-size:0.72rem;color:var(--text-muted);">第 ${idx+1} 题 · ${q.type==='choice'?'单选题':'填空题'}</span>
        <button onclick="retryWrongItem('${fn}',${idx})" style="margin-left:auto;padding:3px 10px;background:var(--bg);border:1px solid var(--border);border-radius:999px;font-size:0.75rem;color:var(--text-muted);cursor:pointer;transition:var(--transition);">重做此题</button>
      </div>
      <div class="quiz-q-text" style="font-size:0.85rem;">${escHtml(q.question)}</div>
      <div style="margin-top:10px;padding:10px 14px;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;font-size:0.82rem;color:var(--text);line-height:1.7;">${answerDisplay}</div>
      <div class="quiz-explanation show" style="margin-top:8px;">💡 ${escHtml(q.explanation)}</div>
    </div>`;
  }).join('');

  container.innerHTML = stats + `<div style="padding:0 2px;">${cardsHtml}</div>`;
}

function retryWrongItem(fn, idx) {
  if (!quizProgress[fn]) return;
  delete quizProgress[fn][idx];
  if (Object.keys(quizProgress[fn]).length === 0) delete quizProgress[fn];
  saveProgress(quizProgress);
  renderWrongBook();
  render();
}

function resetAllWrong() {
  if (!confirm('确认清空所有错题记录（只清除答错的题，答对的保留）？')) return;
  Object.keys(QUIZ_DATA).forEach(fn => {
    if (!quizProgress[fn]) return;
    QUIZ_DATA[fn].forEach((q, i) => {
      const rec = quizProgress[fn][i];
      if (rec && !rec.correct) delete quizProgress[fn][i];
    });
    if (Object.keys(quizProgress[fn]).length === 0) delete quizProgress[fn];
  });
  saveProgress(quizProgress);
  renderWrongBook();
  render();
}

render();
</script>
</body>
</html>
